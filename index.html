<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Pengujian Perangkat Lunak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-light: #1a1a1a;
    --border: #2a2a2a;
    --border-light: #333333;
    --text: #f5f5f5;
    --text-muted: #888888;
    --accent: #FF3D00;
    --accent-hover: #FF5722;
    --success: #00C853;
    --error: #FF1744;
    --warning: #FFD600;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: clamp(16px, 4vw, 40px) clamp(12px, 3vw, 20px);
    line-height: 1.6;
  }

  .app {
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: clamp(20px, 5vw, 32px);
    margin-bottom: clamp(24px, 6vw, 40px);
  }

  .header-brand {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(10px, 2.5vw, 12px);
    font-weight: 600;
    letter-spacing: clamp(2px, 0.5vw, 3px);
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: clamp(6px, 2vw, 8px);
  }

  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(28px, 6vw, 56px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: clamp(12px, 3vw, 16px);
    letter-spacing: clamp(-1.5px, -0.3vw, -2px);
  }

  .header h1 span {
    color: var(--accent);
    font-weight: 700;
  }

  .header-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .topic {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 100px;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .stat {
    background: var(--surface);
    padding: 20px 24px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -1px;
  }

  .stat-value.accent {
    color: var(--accent);
    font-weight: 700;
  }

  .progress-section {
    margin-bottom: 40px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .progress-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    position: relative;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .question-nav {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: clamp(24px, 5vw, 40px);
  }

  .nav-dot {
    aspect-ratio: 1;
    min-height: 36px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(10px, 2.5vw, 11px);
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-dot:hover {
    background: var(--surface-light);
  }

  .nav-dot.current {
    background: var(--accent);
    color: var(--bg);
  }

  .nav-dot.answered {
    background: var(--surface-light);
    color: var(--text);
  }

  .nav-dot.answered.current {
    background: var(--accent);
  }

  .nav-dot.wrong {
    background: var(--error);
    color: var(--bg);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    margin-bottom: 24px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .question-number {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .question-number span {
    color: var(--text-muted);
  }

  .question-text {
    font-size: clamp(16px, 4vw, 18px);
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: clamp(20px, 5vw, 32px);
    color: var(--text);
  }

  .question-image {
    max-width: 100%;
    height: auto;
    margin: clamp(16px, 3vw, 24px) 0;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .option {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 20px;
    padding: 20px 24px;
    background: var(--surface-light);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  }

  .option:hover:not(.disabled) {
    background: var(--border-light);
  }

  .option.selected {
    background: var(--border-light);
    border-color: var(--border);
  }

  .option.correct {
    background: rgba(0, 200, 83, 0.1);
    border-color: var(--success);
    animation: pulseCorrect 0.5s ease;
  }

  .option.correct .option-letter {
    background: var(--success);
    color: var(--bg);
  }

  .option.wrong {
    background: rgba(255, 23, 68, 0.1);
    border-color: var(--error);
    animation: shakeWrong 0.45s ease;
  }

  .option.wrong .option-letter {
    background: var(--error);
    color: var(--bg);
  }

  .option.disabled {
    cursor: default;
  }

  @keyframes shakeWrong {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-9px); }
    30% { transform: translateX(8px); }
    45% { transform: translateX(-6px); }
    60% { transform: translateX(5px); }
    75% { transform: translateX(-3px); }
    90% { transform: translateX(2px); }
  }

  @keyframes pulseCorrect {
    0% { transform: scale(1); }
    35% { transform: scale(1.025); }
    100% { transform: scale(1); }
  }

  .option-letter {
    font-family: 'Outfit', sans-serif;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .option-text {
    font-size: clamp(14px, 2.5vw, 15px);
    font-weight: 400;
    line-height: 1.5;
    display: flex;
    align-items: center;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .explain {
    margin-top: 32px;
    padding: 24px;
    border-left: 2px solid var(--border);
    background: var(--surface-light);
    display: none;
  }

  .explain.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .explain.correct {
    border-color: var(--success);
  }

  .explain.wrong {
    border-color: var(--error);
  }

  .explain-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .explain-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  .nav {
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }

  button {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(11px, 2.5vw, 12px);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: clamp(14px, 3vw, 16px) clamp(24px, 5vw, 32px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    min-height: 48px;
    min-width: 120px;
    -webkit-tap-highlight-color: transparent;
  }

  button:hover:not(:disabled) {
    background: var(--border-light);
    border-color: var(--border-light);
  }

  button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  button.primary:hover:not(:disabled) {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  .sound-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .sound-toggle .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border-light);
    transition: background 0.2s ease;
  }

  .sound-toggle.on .dot {
    background: var(--accent);
  }

  .result {
    text-align: center;
    padding: clamp(32px, 8vw, 60px) clamp(20px, 5vw, 40px);
  }

  .result-brand {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: clamp(16px, 4vw, 24px);
  }

  .result h2 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(32px, 7vw, 72px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: clamp(12px, 3vw, 16px);
    letter-spacing: -1.5px;
  }

  .result .score {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(48px, 12vw, 120px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin: clamp(24px, 6vw, 32px) 0;
  }

  .score-label {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    margin: 40px 0;
  }

  .result-stat {
    background: var(--surface);
    padding: 24px;
  }

  .result-stat-value {
    font-family: 'Outfit', sans-serif;
    font-size: 32px;
    font-weight: 300;
    margin-bottom: 4px;
  }

  .result-stat.correct .result-stat-value {
    color: var(--success);
    font-weight: 700;
  }

  .result-stat.wrong .result-stat-value {
    color: var(--error);
    font-weight: 700;
  }

  .result-stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .result-message {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 40px;
  }

  .hidden {
    display: none !important;
  }

  .keyboard-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-top: 32px;
    padding: 16px;
    border: 1px solid var(--border);
  }

  .keyboard-hint span {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .key {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    min-width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    color: var(--text);
  }

  @media (max-width: 768px) {
    .header {
      padding-bottom: 24px;
      margin-bottom: 24px;
    }

    .header-brand {
      font-size: 10px;
      letter-spacing: 2px;
    }

    .stats-bar {
      margin-bottom: 24px;
    }

    .stat {
      padding: 16px 20px;
    }

    .stat-value {
      font-size: clamp(24px, 5vw, 28px);
    }

    .progress-section {
      margin-bottom: 24px;
    }

    .question-nav {
      margin-bottom: 24px;
    }

    .card {
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-header {
      margin-bottom: 20px;
      padding-bottom: 16px;
    }

    .question-text {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .option {
      gap: 16px;
      padding: 16px 20px;
    }

    .option-letter {
      width: 44px;
      height: 44px;
      font-size: 15px;
    }

    .explain {
      margin-top: 20px;
      padding: 20px;
    }

    .keyboard-hint {
      flex-wrap: wrap;
      gap: 12px;
      padding: 12px;
    }

    .keyboard-hint span:first-child {
      width: 100%;
      text-align: center;
      margin-bottom: 8px;
    }

    .result {
      padding: 40px 24px;
    }

    .result h2 {
      margin-bottom: 12px;
    }

    .result-stats {
      margin: 24px 0;
      gap: 1px;
    }

    .result-stat {
      padding: 20px 16px;
    }

    .result-message {
      font-size: 15px;
      margin-bottom: 32px;
    }
  }

  @media (max-width: 640px) {
    .stats-bar {
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .stat {
      padding: 14px 16px;
    }

    .nav {
      flex-direction: column-reverse;
      gap: 12px;
    }

    .nav button {
      width: 100%;
    }

    .result-stats {
      grid-template-columns: 1fr;
    }

    .option {
      grid-template-columns: 40px 1fr;
      gap: 12px;
      padding: 14px 16px;
    }

    .option-letter {
      width: 40px;
      height: 40px;
      font-size: 14px;
    }

    .header-topics {
      gap: 6px;
    }

    .topic {
      font-size: 9px;
      padding: 4px 10px;
    }
  }

  @media (max-width: 480px) {
    .card {
      padding: 20px 16px;
    }

    .card-header {
      margin-bottom: 16px;
      padding-bottom: 12px;
    }

    .question-text {
      font-size: 15px;
    }

    .option {
      padding: 12px 14px;
    }

    .option-letter {
      width: 36px;
      height: 36px;
      font-size: 13px;
    }

    .option-text {
      font-size: 14px;
    }

    .explain {
      padding: 16px;
      margin-top: 16px;
    }

    .explain-text {
      font-size: 13px;
    }

    .result {
      padding: 32px 20px;
    }

    .result-stat-value {
      font-size: 28px;
    }

    .key {
      min-width: 24px;
      height: 24px;
      font-size: 11px;
    }
  }

  @media (max-width: 360px) {
    body {
      padding: 12px;
    }

    .card {
      padding: 16px 12px;
    }

    .option {
      grid-template-columns: 32px 1fr;
      padding: 10px 12px;
    }

    .option-letter {
      width: 32px;
      height: 32px;
      font-size: 12px;
    }

    .question-nav {
      grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
    }

    .nav-dot {
      min-height: 32px;
      font-size: 9px;
    }
  }

  button:focus-visible,
  .option:focus-visible,
  .nav-dot:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .option.wrong,
    .option.correct {
      animation: none;
    }
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-brand">SIR207 — Kuis 2</div>
    <h1>Pengujian <span>Perangkat Lunak</span></h1>
    <div class="header-topics">
      <span class="topic">Black Box & White Box</span>
      <span class="topic">BVA & ECP</span>
      <span class="topic">Use Case</span>
      <span class="topic">State Transition</span>
      <span class="topic">Decision Table</span>
      <span class="topic">Pairwise</span>
      <span class="topic">Manajemen Pengujian</span>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Soal</div>
      <div class="stat-value" id="currentStat">1<span style="font-size: 16px; color: var(--text-muted);">/56</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Skor</div>
      <div class="stat-value accent" id="scoreStat">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Dijawab</div>
      <div class="stat-value" id="answeredStat">0</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-info">
      <span class="progress-label" id="progressLabel">Kemajuan</span>
      <div style="display:flex; align-items:center; gap:20px;">
        <div class="sound-toggle on" id="soundToggle" onclick="toggleSound()">
          <span class="dot"></span>
          <span id="soundToggleLabel">Suara On</span>
        </div>
        <span class="progress-label" id="progressPercent">0%</span>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progressFill"></div>
    </div>
  </div>

  <div class="question-nav" id="questionNav"></div>

  <div id="quizArea"></div>

  <div id="resultArea" class="card result hidden">
    <div class="result-brand">Hasil Kuis</div>
    <h2 id="resultTitle">Selesai</h2>
    <div class="score">
      <span id="scoreText">0</span>
      <span class="score-label">/ 56</span>
    </div>
    <p class="result-message" id="resultDesc"></p>

    <div class="result-stats">
      <div class="result-stat correct">
        <div class="result-stat-value" id="correctCount">0</div>
        <div class="result-stat-label">Benar</div>
      </div>
      <div class="result-stat wrong">
        <div class="result-stat-value" id="wrongCount">0</div>
        <div class="result-stat-label">Salah</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-value" id="accuracy">0%</div>
        <div class="result-stat-label">Akurasi</div>
      </div>
    </div>

    <div class="nav" style="justify-content: center;">
      <button class="primary" onclick="restartQuiz()">Ulangi Kuis</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    q: "Apa perbedaan utama yang paling mendasar antara teknik pengujian Black Box dan White Box Testing?",
    opts: [
      "Black Box menguji struktur kode internal, sedangkan White Box menguji antarmuka pengguna.",
      "Black Box berfokus pada spesifikasi fungsional tanpa melihat struktur internal, sedangkan White Box menguji jalur logika internal kode program.",
      "Black Box hanya dilakukan oleh tim pengembang, sedangkan White Box hanya dilakukan oleh pengguna akhir (user).",
      "Black Box membutuhkan akses penuh ke source code, sedangkan White Box mengabaikan source code sepenuhnya."
    ],
    correct: 1,
    explain: "<strong>B (Benar):</strong> Sesuai definisi, Black Box mengabaikan struktur kontrol/internal dan fokus pada fungsionalitas eksternal, sedangkan White Box meramalkan cara kerja rinci dan jalur logika internal.<br><strong>A, C, D (Salah):</strong> Terbalik secara konsep; Black Box tidak melihat kode internal dan justru White Box yang membutuhkan akses source code serta sering dilakukan oleh yang paham QA/code."
  },
  {
    q: "Teknik Equivalence Class Partitioning (ECP) membagi domain input menjadi kelas-kelas data. Apa tujuan utama dari pembagian kelas tersebut?",
    opts: [
      "Untuk memastikan semua baris kode dieksekusi minimal satu kali.",
      "Mengurangi jumlah test case dengan memilih satu nilai perwakilan yang mewakili seluruh kelompok data valid atau invalid.",
      "Menguji transisi status dari suatu sistem berbasis menu dinamis.",
      "Menghitung Cyclomatic Complexity dari fungsi matematika yang kompleks."
    ],
    correct: 1,
    explain: "<strong>B (Benar):</strong> ECP mereduksi jumlah kasus uji dengan berasumsi semua nilai dalam satu partisi akan menghasilkan perilaku sistem yang sama (valid atau invalid).<br><strong>A, C, D (Salah):</strong> Poin A adalah tujuan White Box; C adalah State Transition; D adalah Basis Path Testing."

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, startTime, duration, type, gainPeak) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.02);
}

function playCorrectSound() {
  if (!soundOn) return;
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  playTone(523.25, t, 0.14, 'triangle', 0.18);
  playTone(659.25, t + 0.08, 0.14, 'triangle', 0.18);
  playTone(783.99, t + 0.16, 0.22, 'triangle', 0.2);
}

function playWrongSound() {
  if (!soundOn) return;
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  playTone(220, t, 0.16, 'sawtooth', 0.15);
  playTone(164.81, t + 0.1, 0.22, 'sawtooth', 0.15);
}

function toggleSound() {
  soundOn = !soundOn;
  const toggle = document.getElementById('soundToggle');
  const label = document.getElementById('soundToggleLabel');
  toggle.classList.toggle('on', soundOn);
  label.textContent = soundOn ? 'Suara On' : 'Suara Off';
  if (soundOn) getAudioCtx();
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getShuffledOrder(qIdx) {
  if (!shuffleMap[qIdx]) {
    const indices = questions[qIdx].opts.map((_, i) => i);
    shuffleMap[qIdx] = shuffleArray(indices);
  }
  return shuffleMap[qIdx];
}

  renderQuestionNav();
  renderQuiz();
  updateStats();
}

function renderQuestionNav() {
  const nav = document.getElementById('questionNav');
  nav.innerHTML = questions.map((_, i) =>
    `<div class="nav-dot" onclick="goToQuestion(${i})" data-idx="${i}">${i + 1}</div>`
  ).join('');
}

function updateQuestionNav() {
  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.classList.remove('current', 'answered', 'wrong');
    if (i === current) dot.classList.add('current');
    if (answered[i] !== undefined) {
      if (answered[i] === questions[i].correct) {
        dot.classList.add('answered');
      } else {
        dot.classList.add('answered', 'wrong');
      }
    }
  });
}

function goToQuestion(idx) {
  current = idx;
  renderQuiz();
  updateQuestionNav();
}

function getDynamicExplain(q, order) {
  const letters = ['A', 'B', 'C', 'D'];
  // Mapping: original index (0-3) -> display letter (A-D)
  const origToDisplay = {};
  order.forEach((origIdx, displayIdx) => {
    origToDisplay[origIdx] = letters[displayIdx];
  });

  let explain = q.explain;

  // Parse each <strong>...</strong> block and replace letters inside
  // Pattern matches: <strong>content (Benar/Salah):</strong>
  explain = explain.replace(/<strong>(.*?)\s*\((Benar|Salah)\):<\/strong>/g, (match, content, status) => {
    // Split content by comma to get individual letters
    const letterList = content.split(',').map(s => s.trim());
    // Replace each letter with its display equivalent
    const newLetters = letterList.map(origLetter => {
      const origIdx = origLetter.charCodeAt(0) - 65;
      return origToDisplay[origIdx] || origLetter;
    });
    return `<strong>${newLetters.join(', ')} (${status}):</strong>`;
  });

  return explain;
}

function renderQuiz() {
  const area = document.getElementById('quizArea');
  const q = questions[current];
  const userAns = answered[current];
  const order = getShuffledOrder(current);

  const letters = ['A', 'B', 'C', 'D'];

  let optsHtml = order.map((origIdx, displayIdx) => {
    let cls = 'option';
    if (userAns !== undefined) {
      cls += ' disabled';
      if (origIdx === q.correct) cls += ' correct';
      else if (origIdx === userAns) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="selectOption(${origIdx})" data-orig="${origIdx}" tabindex="0">
      <div class="option-letter">${letters[displayIdx]}</div>
      <div class="option-text">${q.opts[origIdx]}</div>
    </div>`;
  }).join('');

  const isCorrect = userAns === q.correct;
  const explainClass = userAns !== undefined ? (isCorrect ? 'correct' : 'wrong') : '';

  area.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="question-number">Soal <span>${current + 1}</span> / ${questions.length}</div>
      </div>
      <p class="question-text">${q.q}</p>
      ${q.image ? `<img src="${q.image}" alt="Gambar soal" class="question-image">` : ''}
      <div class="options">${optsHtml}</div>
      <div class="explain ${userAns !== undefined ? 'show' : ''} ${explainClass}">
        <div class="explain-label">Analisis Opsi</div>
        <div class="explain-text">${userAns !== undefined ? getDynamicExplain(q, order) : ''}</div>
      </div>
    </div>
    <div class="nav">
      <button onclick="prevQuestion()" ${current === 0 ? 'disabled' : ''}>← Sebelumnya</button>
      <button class="primary" onclick="nextQuestion()" ${userAns === undefined ? 'disabled' : ''}>
        ${current === questions.length - 1 ? 'Lihat Hasil' : 'Selanjiutnya →'}
      </button>
    </div>
    <div class="keyboard-hint">
      <span>Gunakan keyboard:</span>
      <span class="key">A</span>
      <span class="key">B</span>
      <span class="key">C</span>
      <span class="key">D</span>
      <span>untuk menjawab</span>
    </div>
  `;

  updateStats();
  updateQuestionNav();
}

function selectOption(origIdx) {
  if (answered[current] !== undefined) return;
  answered[current] = origIdx;
  const isCorrect = origIdx === questions[current].correct;
  if (isCorrect) {
    score++;
    playCorrectSound();
  } else {
    playWrongSound();
  }
  renderQuiz();
}

function nextQuestion() {
  if (current === questions.length - 1) {
    showResult();
  } else {
    current++;
    renderQuiz();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    renderQuiz();
  }
}

function updateStats() {
  const answeredCount = answered.filter(a => a !== undefined).length;
  const pct = Math.round((answeredCount / questions.length) * 100);

  document.getElementById('currentStat').innerHTML = `${current + 1}<span style="font-size: 16px; color: var(--text-muted);">/${questions.length}</span>`;
  document.getElementById('scoreStat').textContent = score;
  document.getElementById('answeredStat').textContent = answeredCount;
  document.getElementById('progressLabel').textContent = answeredCount === questions.length ? 'Selesai!' : 'Kemajuan';
  document.getElementById('progressPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function showResult() {
  document.getElementById('quizArea').classList.add('hidden');
  const resultArea = document.getElementById('resultArea');
  resultArea.classList.remove('hidden');

  const pct = Math.round((score / questions.length) * 100);
  const wrong = questions.length - score;

  document.getElementById('scoreText').textContent = score;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('accuracy').textContent = `${pct}%`;

  const resultTitle = document.getElementById('resultTitle');
  const resultDesc = document.getElementById('resultDesc');

  if (pct >= 80) {
    resultTitle.textContent = 'Luar Biasa';
    resultDesc.textContent = 'Kamu menguasai materi Pengujian Perangkat Lunak dengan sangat baik. Pertahankan prestasimu!';
  } else if (pct >= 60) {
    resultTitle.textContent = 'Bagus Sekali';
    resultDesc.textContent = 'Kamu sudah memahami konsep dasar. Terus belajar untuk meningkatkan pemahamanmu.';
  } else {
    resultTitle.textContent = 'Tetap Semangat';
    resultDesc.textContent = 'Jangan menyerah! Review materi dan coba lagi untuk meningkatkan pemahamanmu.';
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPercent').textContent = '100%';
  document.getElementById('progressLabel').textContent = 'Selesai!';
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = [];
  shuffleMap = [];
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  renderQuiz();
  updateQuestionNav();
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toUpperCase();

  if (['A', 'B', 'C', 'D'].includes(key)) {
    const displayIdx = key.charCodeAt(0) - 65;
    const order = getShuffledOrder(current);
    if (displayIdx < order.length) {
      const origIdx = order[displayIdx];
      selectOption(origIdx);
      setTimeout(() => {
        if (answered[current] !== undefined) {
          nextQuestion();
        }
      }, 400);
    }
  }

  if (e.key === 'ArrowRight' && answered[current] !== undefined) {
    nextQuestion();
  }
  if (e.key === 'ArrowLeft') {
    prevQuestion();
  }

  if (e.key === 'Enter' && answered[current] !== undefined) {
    nextQuestion();
  }
});

init();
</script>
</body>
</html>
