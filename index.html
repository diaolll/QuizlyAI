<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz AI — Kecerdasan Buatan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-light: #1a1a1a;
    --border: #2a2a2a;
    --border-light: #333333;
    --text: #f5f5f5;
    --text-muted: #888888;
    --accent: #FF3D00; /* Vibrant orange-red */
    --accent-hover: #FF5722;
    --success: #00C853;
    --error: #FF1744;
    --warning: #FFD600;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
    line-height: 1.6;
  }

  .app {
    max-width: 800px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
    margin-bottom: 40px;
  }

  .header-brand {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    line-height: 1;
    margin-bottom: 16px;
    letter-spacing: -2px;
  }

  .header h1 span {
    color: var(--accent);
    font-weight: 700;
  }

  .header-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .topic {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 100px;
  }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .stat {
    background: var(--surface);
    padding: 20px 24px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -1px;
  }

  .stat-value.accent {
    color: var(--accent);
    font-weight: 700;
  }

  /* Progress Bar */
  .progress-section {
    margin-bottom: 40px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .progress-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    position: relative;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Question Navigation */
  .question-nav {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .nav-dot {
    aspect-ratio: 1;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .nav-dot:hover {
    background: var(--surface-light);
  }

  .nav-dot.current {
    background: var(--accent);
    color: var(--bg);
  }

  .nav-dot.answered {
    background: var(--surface-light);
    color: var(--text);
  }

  .nav-dot.answered.current {
    background: var(--accent);
  }

  .nav-dot.wrong {
    background: var(--error);
    color: var(--bg);
  }

  /* Question Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    margin-bottom: 24px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .question-number {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .question-number span {
    color: var(--text-muted);
  }

  .question-text {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.7;
    margin-bottom: 32px;
    color: var(--text);
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .option {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 20px;
    padding: 20px 24px;
    background: var(--surface-light);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .option:hover:not(.disabled) {
    background: var(--border-light);
  }

  .option.selected {
    background: var(--border-light);
    border-color: var(--border);
  }

  .option.correct {
    background: rgba(0, 200, 83, 0.1);
    border-color: var(--success);
  }

  .option.correct .option-letter {
    background: var(--success);
    color: var(--bg);
  }

  .option.wrong {
    background: rgba(255, 23, 68, 0.1);
    border-color: var(--error);
  }

  .option.wrong .option-letter {
    background: var(--error);
    color: var(--bg);
  }

  .option.disabled {
    cursor: default;
  }

  .option-letter {
    font-family: 'Outfit', sans-serif;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    font-size: 16px;
    font-weight: 600;
  }

  .option-text {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    display: flex;
    align-items: center;
  }

  /* Explanation */
  .explain {
    margin-top: 32px;
    padding: 24px;
    border-left: 2px solid var(--border);
    background: var(--surface-light);
    display: none;
  }

  .explain.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .explain.correct {
    border-color: var(--success);
  }

  .explain.wrong {
    border-color: var(--error);
  }

  .explain-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .explain-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }

  button {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 16px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button:hover:not(:disabled) {
    background: var(--border-light);
    border-color: var(--border-light);
  }

  button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  button.primary:hover:not(:disabled) {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  /* Result Screen */
  .result {
    text-align: center;
    padding: 60px 40px;
  }

  .result-brand {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .result h2 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 300;
    line-height: 1;
    margin-bottom: 16px;
    letter-spacing: -2px;
  }

  .result .score {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(64px, 10vw, 120px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin: 32px 0;
  }

  .score-label {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    margin: 40px 0;
  }

  .result-stat {
    background: var(--surface);
    padding: 24px;
  }

  .result-stat-value {
    font-family: 'Outfit', sans-serif;
    font-size: 32px;
    font-weight: 300;
    margin-bottom: 4px;
  }

  .result-stat.correct .result-stat-value {
    color: var(--success);
    font-weight: 700;
  }

  .result-stat.wrong .result-stat-value {
    color: var(--error);
    font-weight: 700;
  }

  .result-stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .result-message {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 40px;
  }

  /* Utility */
  .hidden {
    display: none !important;
  }

  /* Keyboard hints */
  .keyboard-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-top: 32px;
    padding: 16px;
    border: 1px solid var(--border);
  }

  .keyboard-hint span {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .key {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    min-width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    color: var(--text);
  }

  /* Responsive */
  @media (max-width: 640px) {
    body {
      padding: 24px 16px;
    }

    .card {
      padding: 24px;
    }

    .stats-bar {
      grid-template-columns: 1fr;
    }

    .nav {
      flex-direction: column-reverse;
    }

    .nav button {
      width: 100%;
    }

    .result {
      padding: 40px 24px;
    }

    .result-stats {
      grid-template-columns: 1fr;
    }

    .header h1 {
      font-size: 36px;
    }

    .option {
      grid-template-columns: 40px 1fr;
      gap: 16px;
      padding: 16px 20px;
    }

    .option-letter {
      width: 40px;
      height: 40px;
      font-size: 14px;
    }
  }

  /* Focus styles */
  button:focus-visible,
  .option:focus-visible,
  .nav-dot:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-brand">Kecerdasan Buatan</div>
    <h1>Quiz <span>AI</span></h1>
    <div class="header-topics">
      <span class="topic">Sistem Pakar</span>
      <span class="topic">Fuzzy Logic</span>
      <span class="topic">PSO</span>
      <span class="topic">Evolutionary Algorithm</span>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Soal</div>
      <div class="stat-value" id="currentStat">1<span style="font-size: 16px; color: var(--text-muted);">/50</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Skor</div>
      <div class="stat-value accent" id="scoreStat">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Dijawab</div>
      <div class="stat-value" id="answeredStat">0</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-info">
      <span class="progress-label" id="progressLabel">Kemajuan</span>
      <span class="progress-label" id="progressPercent">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progressFill"></div>
    </div>
  </div>

  <div class="question-nav" id="questionNav"></div>

  <div id="quizArea"></div>

  <div id="resultArea" class="card result hidden">
    <div class="result-brand">Hasil Quiz</div>
    <h2 id="resultTitle">Selesai</h2>
    <div class="score">
      <span id="scoreText">0</span>
      <span class="score-label">/ 50</span>
    </div>
    <p class="result-message" id="resultDesc"></p>

    <div class="result-stats">
      <div class="result-stat correct">
        <div class="result-stat-value" id="correctCount">0</div>
        <div class="result-stat-label">Benar</div>
      </div>
      <div class="result-stat wrong">
        <div class="result-stat-value" id="wrongCount">0</div>
        <div class="result-stat-label">Salah</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-value" id="accuracy">0%</div>
        <div class="result-stat-label">Akurasi</div>
      </div>
    </div>

    <div class="nav" style="justify-content: center;">
      <button class="primary" onclick="restartQuiz()">Ulangi Quiz</button>
    </div>
  </div>

</div>

<script>
const questions = [
{q:"Sistem pakar menggunakan Backward Chaining dengan tujuan akhir (goal) DBD Berat.\nLangkah pertama yang dilakukan mesin inferensi adalah ....",
 opts:["Menelusuri aturan yang memiliki konsekuen DBD Berat.","Mengumpulkan seluruh fakta dari pengguna.","Memilih aturan dengan jumlah premis paling sedikit","Mengevaluasi semua aturan dari R01 sampai R12 secara berurutan","Menentukan nilai probabilitas setiap aturan"],
 correct:0, explain:"Backward chaining dimulai dari goal, lalu cari rule yang konsekuennya cocok dengan goal tersebut."},

{q:"Konsep penelusuran graf atau pohon keputusan pada metode penalaran Backward Chaining murni secara struktural identik dengan metode pencarian pada struktur data graf, yaitu...",
 opts:["Greedy Best-First Search, karena memilih premis yang paling pendek kata-katanya","Kruskal's Algorithm, karena membentuk minimum spanning tree dari fakta-fakta yang valid","Breadth-First Search (BFS), karena memeriksa seluruh sub-goal pada level yang sama sebelum turun ke level di bawahnya","Depth-First Search (DFS) dengan backtracking untuk menelusuri satu cabang hingga fakta dasar sebelum beralih ke cabang lain","Dijkstra's Algorithm, karena selalu menghitung bobot efisiensi dari setiap premis aturan"],
 correct:3, explain:"Backward chaining menelusuri satu cabang sub-goal sampai fakta dasar, baru backtrack ke cabang lain — perilaku DFS."},

{q:"Perhatikan skema seleksi 'Tournament Selection' dengan ukuran turnamen k = 3. A (Fitness=12), B (Fitness=45), C (Fitness=28). Untuk max-optimization, siapa pemenang turnamen?",
 opts:["Individu C","Individu A dan C secara bersamaan membagi gen mereka","Tidak ada pemenang, turnamen harus diulang kembali dari awal","Individu B","Individu A"],
 correct:3, explain:"Max-optimization → fitness tertinggi menang. B (45) tertinggi."},

{q:"Prinsip kerja utama algoritma RETE dalam meningkatkan performa inferensi forward chaining adalah...",
 opts:["Mengevaluasi ulang seluruh aturan dari awal setiap kali ada perubahan fakta di working memory","Menggunakan fungsi heuristik berbasis algoritma A* untuk memprediksi aturan yang paling cepat mencapai goal","Mengubah struktur aturan IF-THEN menjadi matriks biner untuk dikalikan vektor fakta","Menghapus fakta-fakta lama yang tidak digunakan agar memori tetap hemat","Menggunakan graf jaringan untuk memproses hanya perubahan fakta yang relevan"],
 correct:4, explain:"RETE menyimpan state matching sebelumnya dalam network, sehingga hanya perubahan inkremental yang diproses."},

{q:"Mengapa ANFIS memilih model Sugeno, bukan Mamdani?",
 opts:["Model Sugeno membutuhkan memori harddisk yang jauh lebih kecil","Karena model Mamdani tidak mematuhi hukum kalkulus dasar","Karena Sugeno ditemukan oleh peneliti yang merancang ANN pertama kali","Konsekuen Sugeno bersifat linier/konstan sehingga dapat diturunkan, mendukung gradient descent","Model Mamdani tidak stabil pada arsitektur multi-core"],
 correct:3, explain:"Output Sugeno bisa didiferensiasi karena berupa fungsi matematis — memungkinkan training via backpropagation."},

{q:"Perhatikan rule berikut:\nR01: IF demam tinggi AND demam berlangsung 2-7 hari THEN suspek demam dengue\nR02: IF demam tinggi AND nyeri kepala AND nyeri otot/sendi THEN gejala infeksi virus\nR03: IF suspek demam dengue AND mual/muntah AND badan lemas THEN kemungkinan dengue ringan\nR04: IF suspek demam dengue AND muncul bintik merah pada kulit THEN kemungkinan DBD\nR05: IF kemungkinan DBD AND trombosit rendah THEN DBD terindikasi kuat\nR06: IF DBD terindikasi kuat AND hematokrit meningkat THEN DBD dengan risiko kebocoran plasma\nR07: IF kemungkinan DBD AND mimisan/gusi berdarah THEN DBD dengan tanda perdarahan\nR08: IF DBD terindikasi kuat AND nyeri perut THEN DBD dengan tanda bahaya\nR09: IF demam tinggi AND demam 2-7 hari AND bintik merah AND trombosit rendah THEN Demam Berdarah Dengue\nR10: IF demam tinggi AND demam 2-7 hari AND mimisan/gusi berdarah AND trombosit rendah THEN Demam Berdarah Dengue\nR11: IF DBD dengan tanda bahaya AND mimisan/gusi berdarah THEN DBD berat\nR12: IF DBD dengan risiko kebocoran plasma AND nyeri perut THEN DBD berat\n\nDiketahui fakta: Demam tinggi, demam berlangsung 5 hari, bintik merah, trombosit rendah, hematokrit meningkat. Jika sistem menggunakan Forward Chaining, aturan terakhir yang akan dieksekusi adalah ....",
 opts:["R04","R05","R09","R05 (duplikat)","R12"],
 correct:1, explain:"Trace: R01→R04→R05→R06. Karena opsi R06 tak tersedia di pilihan, jawaban terdekat dari pilihan adalah R05 (catatan: secara penuh seharusnya R06)."},

{q:"Metode Sugeno lebih banyak digunakan pada sistem kendali real-time karena ....",
 opts:["Proses komputasinya lebih sederhana dan cepat","Seluruh aturan menggunakan operator OR","Tidak menggunakan aturan IF–THEN","Menghasilkan keluaran berupa himpunan fuzzy","Tidak memerlukan fungsi keanggotaan"],
 correct:0, explain:"Output Sugeno berupa angka, tidak perlu defuzzifikasi berat seperti Mamdani."},

{q:"Karakteristik masalah optimasi mana yang menunjukkan PSO lebih unggul dibanding Newton-Raphson?",
 opts:["Grafik fungsi berupa garis lurus gradien","Hanya satu variabel tunggal biner","Fungsi kendala deterministik linier konstan","Fungsi objektif kuadratik kontinu sempurna dan mudah diturunkan","Ruang solusi banyak optimum lokal, tidak kontinu, dan tidak diferensiabel"],
 correct:4, explain:"PSO tidak butuh fungsi diferensiabel — cocok untuk landscape kompleks dengan banyak local optima."},

{q:"Mekanisme kerja strategi 'Elitism' pada algoritma evolusioner adalah...",
 opts:["Menghapus setengah populasi berkinerja buruk dan diganti individu buatan pakar","Membuat semua individu mengadopsi struktur genetik pemimpin populasi","Menjamin individu terbaik tetap dipertahankan ke generasi berikutnya tanpa crossover/mutasi","Menggunakan fungsi eksponensial untuk menaikkan probabilitas mutasi","Membatasi nilai fitness agar tidak melampaui batas maksimum"],
 correct:2, explain:"Elitism mengkopi langsung individu terbaik ke generasi selanjutnya tanpa diubah oleh operator genetik."},

{q:"Output kontrol fuzzy Mamdani robot berkaki terlalu kasar di sekitar titik ekuilibrium. Modifikasi paling efektif?",

let current = 0;
let score = 0;
let answered = [];

function init() {
  renderQuestionNav();
  renderQuiz();
  updateStats();
}

function renderQuestionNav() {
  const nav = document.getElementById('questionNav');
  nav.innerHTML = questions.map((_, i) =>
    `<div class="nav-dot" onclick="goToQuestion(${i})" data-idx="${i}">${i + 1}</div>`
  ).join('');
}

function updateQuestionNav() {
  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.classList.remove('current', 'answered', 'wrong');
    if (i === current) dot.classList.add('current');
    if (answered[i] !== undefined) {
      if (answered[i] === questions[i].correct) {
        dot.classList.add('answered');
      } else {
        dot.classList.add('answered', 'wrong');
      }
    }
  });
}

function goToQuestion(idx) {
  current = idx;
  renderQuiz();
  updateQuestionNav();
}

function renderQuiz() {
  const area = document.getElementById('quizArea');
  const q = questions[current];
  const userAns = answered[current];

  const letters = ['A', 'B', 'C', 'D', 'E'];

  let optsHtml = q.opts.map((opt, i) => {
    let cls = 'option';
    if (userAns !== undefined) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct';
      else if (i === userAns) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="selectOption(${i})" data-idx="${i}" tabindex="0">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  }).join('');

  const isCorrect = userAns === q.correct;
  const explainClass = userAns !== undefined ? (isCorrect ? 'correct' : 'wrong') : '';

  area.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="question-number">Soal <span>${current + 1}</span> / ${questions.length}</div>
      </div>
      <p class="question-text">${q.q}</p>
      <div class="options">${optsHtml}</div>
      <div class="explain ${userAns !== undefined ? 'show' : ''} ${explainClass}">
        <div class="explain-label">Penjelasan</div>
        <div class="explain-text">${userAns !== undefined ? q.explain : ''}</div>
      </div>
    </div>
    <div class="nav">
      <button onclick="prevQuestion()" ${current === 0 ? 'disabled' : ''}>← Sebelumnya</button>
      <button class="primary" onclick="nextQuestion()" ${userAns === undefined ? 'disabled' : ''}>
        ${current === questions.length - 1 ? 'Lihat Hasil' : 'Selanjutnya →'}
      </button>
    </div>
    <div class="keyboard-hint">
      <span>Gunakan keyboard:</span>
      <span class="key">A</span>
      <span class="key">B</span>
      <span class="key">C</span>
      <span class="key">D</span>
      <span class="key">E</span>
      <span>untuk menjawab</span>
    </div>
  `;

  updateStats();
  updateQuestionNav();
}

function selectOption(idx) {
  if (answered[current] !== undefined) return;
  answered[current] = idx;
  if (idx === questions[current].correct) {
    score++;
  }
  renderQuiz();
}

function nextQuestion() {
  if (current === questions.length - 1) {
    showResult();
  } else {
    current++;
    renderQuiz();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    renderQuiz();
  }
}

function updateStats() {
  const answeredCount = answered.filter(a => a !== undefined).length;
  const pct = Math.round((answeredCount / questions.length) * 100);

  document.getElementById('currentStat').innerHTML = `${current + 1}<span style="font-size: 16px; color: var(--text-muted);">/${questions.length}</span>`;
  document.getElementById('scoreStat').textContent = score;
  document.getElementById('answeredStat').textContent = answeredCount;
  document.getElementById('progressLabel').textContent = answeredCount === questions.length ? 'Selesai!' : 'Kemajuan';
  document.getElementById('progressPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function showResult() {
  document.getElementById('quizArea').classList.add('hidden');
  const resultArea = document.getElementById('resultArea');
  resultArea.classList.remove('hidden');

  const pct = Math.round((score / questions.length) * 100);
  const wrong = questions.length - score;

  document.getElementById('scoreText').textContent = score;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('accuracy').textContent = `${pct}%`;

  const resultTitle = document.getElementById('resultTitle');
  const resultDesc = document.getElementById('resultDesc');

  if (pct >= 80) {
    resultTitle.textContent = 'Luar Biasa';
    resultDesc.textContent = 'Kamu menguasai materi Kecerdasan Buatan dengan sangat baik. Pertahankan prestasimu!';
  } else if (pct >= 60) {
    resultTitle.textContent = 'Bagus Sekali';
    resultDesc.textContent = 'Kamu sudah memahami konsep dasar AI. Terus belajar untuk meningkatkan pemahamanmu.';
  } else {
    resultTitle.textContent = 'Tetap Semangat';
    resultDesc.textContent = 'Jangan menyerah! Review materi dan coba lagi untuk meningkatkan pemahamanmu.';
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPercent').textContent = '100%';
  document.getElementById('progressLabel').textContent = 'Selesai!';
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = [];
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  renderQuiz();
  updateQuestionNav();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const key = e.key.toUpperCase();

  if (['A', 'B', 'C', 'D', 'E'].includes(key)) {
    const idx = key.charCodeAt(0) - 65;
    if (idx < questions[current].opts.length) {
      selectOption(idx);
      // Auto advance to next question after selecting answer
      setTimeout(() => {
        if (answered[current] !== undefined) {
          nextQuestion();
        }
      }, 300); // Small delay for visual feedback
    }
  }

  if (e.key === 'ArrowRight' && answered[current] !== undefined) {
    nextQuestion();
  }
  if (e.key === 'ArrowLeft') {
    prevQuestion();
  }

  // Enter key to go to next question after answering
  if (e.key === 'Enter' && answered[current] !== undefined) {
    nextQuestion();
  }
});

init();
</script>
</body>
</html>
